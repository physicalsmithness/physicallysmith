<!DOCTYPE html>
<html lang="en">
<head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-WKYGJYERSR"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-WKYGJYERSR');
</script>
    <meta charset="UTF-8">
    <title>Dynamic River Meander Sim</title>
    <style>
        body { margin: 0; background: #3e2723; color: white; font-family: system-ui; overflow: hidden; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; z-index: 10; display: flex; gap: 15px; align-items: center; }
        canvas { display: block; filter: contrast(1.2); }
        .stat { font-family: monospace; color: #4fc3f7; }
        input[type=range] { vertical-align: middle; }
    </style>
<!-- GA4 interaction tracking -->
<script>
(function () {
  if (window.__ga4InteractionTrackingInstalled) return;
  window.__ga4InteractionTrackingInstalled = true;

  var trackableSelector = 'a, button, input, select, textarea, summary, [role="button"], [role="link"], [role="tab"], [role="menuitem"], [data-ga4-click], [onclick]';
  var maxLength = 120;

  function clean(value, limit) {
    var text = String(value || '').replace(/\s+/g, ' ').trim();
    return text.slice(0, limit || maxLength);
  }

  function getLabel(element) {
    if (!element) return '';
    var tag = (element.tagName || '').toLowerCase();
    var type = (element.getAttribute('type') || '').toLowerCase();
    if ((tag === 'input' || tag === 'textarea') && !/^(button|submit|reset|checkbox|radio)$/.test(type)) {
      return clean(element.getAttribute('aria-label') || element.getAttribute('title') || element.getAttribute('name') || tag);
    }
    return clean(
      element.getAttribute('data-ga4-label') ||
      element.getAttribute('aria-label') ||
      element.getAttribute('title') ||
      element.innerText ||
      element.textContent ||
      element.getAttribute('name') ||
      element.getAttribute('id') ||
      tag
    );
  }

  function getClasses(element) {
    if (!element || !element.classList) return '';
    return clean(Array.prototype.slice.call(element.classList, 0, 6).join(' '));
  }

  function getTargetPath(element) {
    var parts = [];
    var current = element;
    while (current && current.nodeType === 1 && current !== document.body && parts.length < 5) {
      var part = (current.tagName || '').toLowerCase();
      var id = current.getAttribute('id');
      var testId = current.getAttribute('data-testid') || current.getAttribute('data-test') || current.getAttribute('data-ga4-id');
      if (id) {
        part += '#' + clean(id, 60);
        parts.unshift(part);
        break;
      }
      if (testId) part += '[data-id="' + clean(testId, 60) + '"]';
      var classes = getClasses(current).split(' ').filter(Boolean).slice(0, 2);
      if (classes.length) part += '.' + classes.join('.');
      parts.unshift(part);
      current = current.parentElement;
    }
    return clean(parts.join(' > '), 220);
  }

  function sendClickEvent(element) {
    if (typeof gtag !== 'function') return;
    var tag = (element.tagName || '').toLowerCase();
    var params = {
      event_category: 'engagement',
      element_type: tag,
      element_id: clean(element.getAttribute('id')),
      element_name: clean(element.getAttribute('name')),
      element_role: clean(element.getAttribute('role')),
      element_classes: getClasses(element),
      element_label: getLabel(element),
      click_target: getTargetPath(element),
      page_path: clean(window.location.pathname, 220)
    };

    if (tag === 'input') params.input_type = clean(element.getAttribute('type') || 'text');

    var href = element.getAttribute('href') || element.href;
    if (href) {
      try {
        var url = new URL(href, window.location.href);
        params.link_url = clean(url.href, 500);
        params.link_domain = clean(url.hostname);
        params.outbound = url.hostname !== window.location.hostname ? 'true' : 'false';
      } catch (error) {
        params.link_url = clean(href, 500);
      }
    }

    try {
      gtag('event', 'site_click', params);
    } catch (error) {
      // Analytics should never interfere with the page.
    }
  }

  document.addEventListener('click', function (event) {
    if (!event.target || !event.target.closest) return;
    var element = event.target.closest(trackableSelector);
    if (!element || !document.documentElement.contains(element)) return;
    sendClickEvent(element);
  }, true);
})();
</script>
</head>
<body>

<div id="ui">
    <div>Speed: <input type="range" id="speed" min="2" max="15" value="6"></div>
    <div>Erosion: <input type="range" id="erosion" min="0" max="10" value="4"></div>
    <button onclick="reset()">Clear & Reset</button>
    <div class="stat">Click to drop boulders!</div>
</div>

<canvas id="sim"></canvas>

<script>
const canvas = document.getElementById('sim');
const ctx = canvas.getContext('2d');
const speedCtrl = document.getElementById('speed');
const erosionCtrl = document.getElementById('erosion');

let width, height, rows, cols;
const cellSize = 8;
let grid = []; // 0: water, 1: land
let particles = [];
let obstacles = [];

function reset() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    cols = Math.ceil(width / cellSize);
    rows = Math.ceil(height / cellSize);
    
    grid = [];
    obstacles = [];
    for (let x = 0; x < cols; x++) {
        grid[x] = [];
        for (let y = 0; y < rows; y++) {
            const riverWidth = 10;
            const mid = rows / 2;
            grid[x][y] = (y > mid - riverWidth && y < mid + riverWidth) ? 0 : 1;
        }
    }
    
    particles = [];
    for(let i=0; i<400; i++) particles.push(new Particle());
}

class Particle {
    constructor() { this.init(); }
    init() {
        this.x = 0;
        this.y = (height / 2) + (Math.random() * 80 - 40);
        this.vx = parseFloat(speedCtrl.value);
        this.vy = (Math.random() - 0.5) * 2;
        this.life = 0;
    }

    update() {
        // Apply slight Brownian motion for "slosh"
        this.vy += (Math.random() - 0.5) * 0.5;
        
        let nx = this.x + this.vx;
        let ny = this.y + this.vy;

        let gx = Math.floor(nx / cellSize);
        let gy = Math.floor(ny / cellSize);

        // Boundary/Land collision
        if (grid[gx] && grid[gx][gy] === 1) {
            // Erode!
            if (Math.random() < (erosionCtrl.value / 100)) {
                grid[gx][gy] = 0;
            }
            // Bounce physics
            this.vy *= -1.2; 
            this.vx *= 0.9;
            nx = this.x; // Don't move into wall
        }

        // Obstacle collision
        obstacles.forEach(o => {
            const dx = nx - o.x;
            const dy = ny - o.y;
            const d = Math.sqrt(dx*dx + dy*dy);
            if (d < 25) {
                this.vx *= 0.8;
                this.vy += dy * 0.5;
            }
        });

        this.x = nx;
        this.y = ny;
        this.vx = Math.min(this.vx + 0.2, speedCtrl.value);

        if (this.x > width || this.y < 0 || this.y > height) this.init();
    }
}

function draw() {
    // 1. Draw the "Carved" River Bed
    ctx.fillStyle = "#3e2723"; // Land
    ctx.fillRect(0, 0, width, height);
    
    ctx.fillStyle = "#1a237e"; // Deep Water
    for (let x = 0; x < cols; x++) {
        for (let y = 0; y < rows; y++) {
            if (grid[x][y] === 0) {
                ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
            }
        }
    }

    // 2. Draw Obstacles
    ctx.fillStyle = "#9e9e9e";
    obstacles.forEach(o => {
        ctx.beginPath();
        ctx.arc(o.x, o.y, 20, 0, 7);
        ctx.fill();
    });

    // 3. Draw Fluid Particles
    ctx.fillStyle = "#4fc3f7";
    particles.forEach(p => {
        p.update();
        // Speed affects brightness
        const speedVal = Math.abs(p.vx) + Math.abs(p.vy);
        ctx.globalAlpha = Math.min(speedVal / 10, 1.0);
        ctx.fillRect(p.x, p.y, 3, 3);
    });
    ctx.globalAlpha = 1.0;

    requestAnimationFrame(draw);
}

canvas.addEventListener('mousedown', e => {
    obstacles.push({x: e.clientX, y: e.clientY});
});

window.addEventListener('resize', reset);
reset();
draw();
</script>
</body>
</html>
