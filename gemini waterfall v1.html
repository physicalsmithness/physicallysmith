<!DOCTYPE html>
<html>
<head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-WKYGJYERSR"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-WKYGJYERSR');
</script>
    <style>
        body { background: #222; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #555; background: #000; cursor: crosshair; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; background: #333; border-radius: 8px; margin-top: 10px; }
        label { font-size: 12px; }
        button { grid-column: span 2; padding: 10px; background: #068; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #08a; }
    </style>
<!-- GA4 interaction tracking -->
<script>
(function () {
  if (window.__ga4InteractionTrackingInstalled) return;
  window.__ga4InteractionTrackingInstalled = true;

  var trackableSelector = 'a, button, input, select, textarea, summary, [role="button"], [role="link"], [role="tab"], [role="menuitem"], [data-ga4-click], [onclick]';
  var maxLength = 120;

  function clean(value, limit) {
    var text = String(value || '').replace(/\s+/g, ' ').trim();
    return text.slice(0, limit || maxLength);
  }

  function getLabel(element) {
    if (!element) return '';
    var tag = (element.tagName || '').toLowerCase();
    var type = (element.getAttribute('type') || '').toLowerCase();
    if ((tag === 'input' || tag === 'textarea') && !/^(button|submit|reset|checkbox|radio)$/.test(type)) {
      return clean(element.getAttribute('aria-label') || element.getAttribute('title') || element.getAttribute('name') || tag);
    }
    return clean(
      element.getAttribute('data-ga4-label') ||
      element.getAttribute('aria-label') ||
      element.getAttribute('title') ||
      element.innerText ||
      element.textContent ||
      element.getAttribute('name') ||
      element.getAttribute('id') ||
      tag
    );
  }

  function getClasses(element) {
    if (!element || !element.classList) return '';
    return clean(Array.prototype.slice.call(element.classList, 0, 6).join(' '));
  }

  function getTargetPath(element) {
    var parts = [];
    var current = element;
    while (current && current.nodeType === 1 && current !== document.body && parts.length < 5) {
      var part = (current.tagName || '').toLowerCase();
      var id = current.getAttribute('id');
      var testId = current.getAttribute('data-testid') || current.getAttribute('data-test') || current.getAttribute('data-ga4-id');
      if (id) {
        part += '#' + clean(id, 60);
        parts.unshift(part);
        break;
      }
      if (testId) part += '[data-id="' + clean(testId, 60) + '"]';
      var classes = getClasses(current).split(' ').filter(Boolean).slice(0, 2);
      if (classes.length) part += '.' + classes.join('.');
      parts.unshift(part);
      current = current.parentElement;
    }
    return clean(parts.join(' > '), 220);
  }

  function sendClickEvent(element) {
    if (typeof gtag !== 'function') return;
    var tag = (element.tagName || '').toLowerCase();
    var params = {
      event_category: 'engagement',
      element_type: tag,
      element_id: clean(element.getAttribute('id')),
      element_name: clean(element.getAttribute('name')),
      element_role: clean(element.getAttribute('role')),
      element_classes: getClasses(element),
      element_label: getLabel(element),
      click_target: getTargetPath(element),
      page_path: clean(window.location.pathname, 220)
    };

    if (tag === 'input') params.input_type = clean(element.getAttribute('type') || 'text');

    var href = element.getAttribute('href') || element.href;
    if (href) {
      try {
        var url = new URL(href, window.location.href);
        params.link_url = clean(url.href, 500);
        params.link_domain = clean(url.hostname);
        params.outbound = url.hostname !== window.location.hostname ? 'true' : 'false';
      } catch (error) {
        params.link_url = clean(href, 500);
      }
    }

    try {
      gtag('event', 'site_click', params);
    } catch (error) {
      // Analytics should never interfere with the page.
    }
  }

  document.addEventListener('click', function (event) {
    if (!event.target || !event.target.closest) return;
    var element = event.target.closest(trackableSelector);
    if (!element || !document.documentElement.contains(element)) return;
    sendClickEvent(element);
  }, true);
})();
</script>
</head>
<body>
    <h2>Geological Waterfall Simulator</h2>
    <canvas id="sim" width="600" height="400"></canvas>
    
    <div class="controls">
        <label>Erosion Rate: <input type="range" id="erosion" min="0" max="100" value="30"></label>
        <label>Water Flow: <input type="range" id="flow" min="1" max="20" value="5"></label>
        <label>Hard Rock Resistance: <input type="range" id="hardResist" min="1" max="100" value="90"></label>
        <label>Soft Rock Resistance: <input type="range" id="softResist" min="1" max="100" value="10"></label>
        <button onclick="resetSim()">Reset Terrain</button>
        <p style="grid-column: span 2; font-size: 11px; color: #ccc;">Water flows from left to right. Dark gray = Hard Rock, Light brown = Soft Rock. Watch for undercutting!</p>
    </div>

    <script>
        const canvas = document.getElementById('sim');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        const cellSize = 4;
        const cols = width / cellSize;
        const rows = height / cellSize;

        let terrain = []; // 0: Air, 1: Hard Rock, 2: Soft Rock
        let water = [];   // Amount of water in cell

        function resetSim() {
            terrain = [];
            water = new Array(cols * rows).fill(0);
            for (let i = 0; i < cols * rows; i++) {
                let x = (i % cols);
                let y = Math.floor(i / cols);
                
                // Initial landscape: A high plateau on the left
                if (y > rows * 0.4) {
                    if (x < cols * 0.3) {
                        // Hard cap rock on top
                        terrain[i] = (y < rows * 0.5) ? 1 : 2;
                    } else if (y > rows * 0.8) {
                        terrain[i] = 2; // Bottom basin
                    } else {
                        terrain[i] = 0;
                    }
                } else {
                    terrain[i] = 0;
                }
            }
        }

        function update() {
            const erosionRate = document.getElementById('erosion').value / 1000;
            const flowRate = parseInt(document.getElementById('flow').value);
            const hResist = document.getElementById('hardResist').value / 100;
            const sResist = document.getElementById('softResist').value / 100;

            // 1. Add water at source
            for(let f = 0; f < flowRate; f++) {
                water[Math.floor(rows * 0.35) * cols] += 1;
            }

            // 2. Physics & Erosion
            for (let i = cols * rows - 1; i >= 0; i--) {
                if (water[i] <= 0) continue;

                let x = i % cols;
                let y = Math.floor(i / cols);
                let below = i + cols;
                let right = i + 1;

                // Move Water
                if (y < rows - 1 && terrain[below] === 0) {
                    // Fall down
                    let move = Math.min(water[i], 1);
                    water[below] += move;
                    water[i] -= move;
                } else if (x < cols - 1 && terrain[right] === 0) {
                    // Flow right
                    let move = Math.min(water[i], 0.5);
                    water[right] += move;
                    water[i] -= move;
                }

                // Erode Terrain
                let target = (y < rows - 1 && terrain[below] !== 0) ? below : (x < cols - 1 ? right : -1);
                if (target !== -1 && terrain[target] > 0) {
                    let resistance = (terrain[target] === 1) ? hResist : sResist;
                    if (Math.random() > resistance) {
                        terrain[target] = 0; // Turn rock to air
                    }
                }
                
                // Evaporate / Remove water at edge
                if (x >= cols - 2 || y >= rows - 2) water[i] = 0;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < cols * rows; i++) {
                if (terrain[i] === 0 && water[i] <= 0) continue;

                let x = (i % cols) * cellSize;
                let y = Math.floor(i / cols) * cellSize;

                if (terrain[i] === 1) ctx.fillStyle = '#555'; // Hard Rock
                else if (terrain[i] === 2) ctx.fillStyle = '#864'; // Soft Rock
                else if (water[i] > 0) ctx.fillStyle = `rgba(0, 150, 255, ${Math.min(water[i], 1)})`;

                ctx.fillRect(x, y, cellSize, cellSize);
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        resetSim();
        loop();
    </script>
</body>
</html>
