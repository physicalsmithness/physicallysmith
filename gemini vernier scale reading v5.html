<script>
(function () {
  if (window.__ga4InteractionTrackingInstalled) return;
  window.__ga4InteractionTrackingInstalled = true;

  var trackableSelector = 'a, button, input, select, textarea, summary, [role="button"], [role="link"], [role="tab"], [role="menuitem"], [data-ga4-click], [onclick]';
  var maxLength = 120;

  function clean(value, limit) {
    var text = String(value || '').replace(/\s+/g, ' ').trim();
    return text.slice(0, limit || maxLength);
  }

  function getLabel(element) {
    if (!element) return '';
    var tag = (element.tagName || '').toLowerCase();
    var type = (element.getAttribute('type') || '').toLowerCase();
    if ((tag === 'input' || tag === 'textarea') && !/^(button|submit|reset|checkbox|radio)$/.test(type)) {
      return clean(element.getAttribute('aria-label') || element.getAttribute('title') || element.getAttribute('name') || tag);
    }
    return clean(
      element.getAttribute('data-ga4-label') ||
      element.getAttribute('aria-label') ||
      element.getAttribute('title') ||
      element.innerText ||
      element.textContent ||
      element.getAttribute('name') ||
      element.getAttribute('id') ||
      tag
    );
  }

  function getClasses(element) {
    if (!element || !element.classList) return '';
    return clean(Array.prototype.slice.call(element.classList, 0, 6).join(' '));
  }

  function getTargetPath(element) {
    var parts = [];
    var current = element;
    while (current && current.nodeType === 1 && current !== document.body && parts.length < 5) {
      var part = (current.tagName || '').toLowerCase();
      var id = current.getAttribute('id');
      var testId = current.getAttribute('data-testid') || current.getAttribute('data-test') || current.getAttribute('data-ga4-id');
      if (id) {
        part += '#' + clean(id, 60);
        parts.unshift(part);
        break;
      }
      if (testId) part += '[data-id="' + clean(testId, 60) + '"]';
      var classes = getClasses(current).split(' ').filter(Boolean).slice(0, 2);
      if (classes.length) part += '.' + classes.join('.');
      parts.unshift(part);
      current = current.parentElement;
    }
    return clean(parts.join(' > '), 220);
  }

  function sendClickEvent(element) {
    if (typeof gtag !== 'function') return;
    var tag = (element.tagName || '').toLowerCase();
    var params = {
      event_category: 'engagement',
      element_type: tag,
      element_id: clean(element.getAttribute('id')),
      element_name: clean(element.getAttribute('name')),
      element_role: clean(element.getAttribute('role')),
      element_classes: getClasses(element),
      element_label: getLabel(element),
      click_target: getTargetPath(element),
      page_path: clean(window.location.pathname, 220)
    };

    if (tag === 'input') params.input_type = clean(element.getAttribute('type') || 'text');

    var href = element.getAttribute('href') || element.href;
    if (href) {
      try {
        var url = new URL(href, window.location.href);
        params.link_url = clean(url.href, 500);
        params.link_domain = clean(url.hostname);
        params.outbound = url.hostname !== window.location.hostname ? 'true' : 'false';
      } catch (error) {
        params.link_url = clean(href, 500);
      }
    }

    try {
      gtag('event', 'site_click', params);
    } catch (error) {
      // Analytics should never interfere with the page.
    }
  }

  document.addEventListener('click', function (event) {
    if (!event.target || !event.target.closest) return;
    var element = event.target.closest(trackableSelector);
    if (!element || !document.documentElement.contains(element)) return;
    sendClickEvent(element);
  }, true);
})();
</script>

<script>

    let currentTool = 'micrometer'; // 'micrometer' or 'caliper'
    let targetValue = 0;

    // --- Drawing Functions ---

    function render() {
        // Clear previous input
        document.getElementById('userInput').value = '';
        document.getElementById('feedback').innerHTML = '';
        
        if (currentTool === 'micrometer') {
            drawMicrometer();
        } else {
            drawCaliper();
        }
    }

    function drawMicrometer() {
        document.getElementById('tool-name').innerText = "Micrometer (0.01mm)";
        document.getElementById('tool-instruction').innerText = "Read Main Scale (0.5mm steps) + Thimble (0.01mm steps)";
        
        // 1. Generate Random Value (0 to 15mm)
        // We round to 2 decimal places to ensure clean math
        targetValue = (Math.floor(Math.random() * 1500) / 100); 

        // 2. Calculate Graphics
        const PIXELS_PER_MM = 40;
        const OFFSET_X = 50; 
        const thimbleEdge = OFFSET_X + (targetValue * PIXELS_PER_MM);
        
        // 3. Build SVG String
        let svg = `<svg width="700" height="220" viewBox="0 0 700 220" xmlns="http://www.w3.org/2000/svg">`;
        
        // Define Clip Path (The "Mask" created by the thimble)
        svg += `<defs><clipPath id="maskLeft"><rect x="0" y="0" width="${thimbleEdge}" height="220" /></clipPath></defs>`;

        // MAIN SLEEVE (Static part)
        // We group it and apply the clipPath so parts under the thimble are hidden
        svg += `<g clip-path="url(#maskLeft)">`;
        svg += `<line x1="20" y1="110" x2="680" y2="110" stroke="#333" stroke-width="2"/>`; // Center line
        
        // Draw Ticks (0 to 17mm to be safe)
        for (let m = 0; m <= 34; m++) { // m is half-mm steps
            let val = m / 2;
            let x = OFFSET_X + (val * PIXELS_PER_MM);
            
            if (m % 2 === 0) { // Whole mm (Top)
                svg += `<line x1="${x}" y1="110" x2="${x}" y2="80" stroke="#333" stroke-width="2"/>`;
                svg += `<text x="${x}" y="70" text-anchor="middle" font-family="Arial" font-size="14" fill="#333">${val}</text>`;
            } else { // Half mm (Bottom)
                svg += `<line x1="${x}" y1="110" x2="${x}" y2="135" stroke="#333" stroke-width="2"/>`;
            }
        }
        svg += `</g>`; // End Main Sleeve

        // THIMBLE (Moving part)
        svg += `<g transform="translate(${thimbleEdge}, 0)">`;
        // Thimble Body
        svg += `<rect x="0" y="40" width="150" height="140" fill="#b2bec3" stroke="#636e72" stroke-width="2"/>`;
        svg += `<line x1="0" y1="40" x2="0" y2="180" stroke="#d63031" stroke-width="3"/>`; // Reading Edge (Red)

        // Thimble Ticks logic
        // We need to figure out which number matches the datum line (y=110)
        let decimal = Math.round((targetValue % 0.5) * 100); // 0 to 49
        
        // Draw a window of ticks around the center value
        for (let i = -6; i <= 6; i++) {
            let val = decimal + i;
            // Wrap logic: 49+1 -> 0, 0-1 -> 49
            let displayNum = (val + 50) % 50;
            
            let y = 110 + (i * 12); // Spacing 12px
            
            let len = (displayNum % 5 === 0) ? 25 : 15;
            svg += `<line x1="0" y1="${y}" x2="${len}" y2="${y}" stroke="#333" stroke-width="1"/>`;
            
            if (displayNum % 5 === 0) {
