<head>

    <meta charset="UTF-8">
    <title>Extreme Hydro-Physics Sim</title>
    <style>
        body { margin: 0; background: #020408; color: #00f2fe; font-family: 'Arial', sans-serif; overflow: hidden; display: flex; }
        #ui { width: 320px; background: rgba(10, 15, 25, 0.95); padding: 20px; border-right: 1px solid #1e3a5a; z-index: 100; height: 100vh; overflow-y: auto; box-shadow: 10px 0 30px rgba(0,0,0,0.8); }

        label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; color: #4facfe; }
        input[type=range] { width: 100%; accent-color: #00f2fe; }
        .data-readout { font-family: monospace; font-size: 14px; margin-top: 20px; padding: 10px; background: rgba(0,0,0,0.3); border: 1px solid #1e3a5a; }
        h1 { font-size: 18px; margin-bottom: 20px; border-bottom: 1px solid #00f2fe; padding-bottom: 10px; }
        canvas { flex-grow: 1; background: #020408; }
    </style>
<!-- GA4 interaction tracking -->
<script>
(function () {
  if (window.__ga4InteractionTrackingInstalled) return;
  window.__ga4InteractionTrackingInstalled = true;

  var trackableSelector = 'a, button, input, select, textarea, summary, [role="button"], [role="link"], [role="tab"], [role="menuitem"], [data-ga4-click], [onclick]';
  var maxLength = 120;

  function clean(value, limit) {
    var text = String(value || '').replace(/\s+/g, ' ').trim();
    return text.slice(0, limit || maxLength);
  }

  function getLabel(element) {
    if (!element) return '';
    var tag = (element.tagName || '').toLowerCase();
    var type = (element.getAttribute('type') || '').toLowerCase();
    if ((tag === 'input' || tag === 'textarea') && !/^(button|submit|reset|checkbox|radio)$/.test(type)) {
      return clean(element.getAttribute('aria-label') || element.getAttribute('title') || element.getAttribute('name') || tag);
    }
    return clean(
      element.getAttribute('data-ga4-label') ||
      element.getAttribute('aria-label') ||
      element.getAttribute('title') ||
      element.innerText ||
      element.textContent ||
      element.getAttribute('name') ||
      element.getAttribute('id') ||
      tag
    );
  }

  function getClasses(element) {
    if (!element || !element.classList) return '';
    return clean(Array.prototype.slice.call(element.classList, 0, 6).join(' '));
  }

  function getTargetPath(element) {
    var parts = [];
    var current = element;
    while (current && current.nodeType === 1 && current !== document.body && parts.length < 5) {
      var part = (current.tagName || '').toLowerCase();
      var id = current.getAttribute('id');
      var testId = current.getAttribute('data-testid') || current.getAttribute('data-test') || current.getAttribute('data-ga4-id');
      if (id) {
        part += '#' + clean(id, 60);
        parts.unshift(part);
        break;
      }
      if (testId) part += '[data-id="' + clean(testId, 60) + '"]';
      var classes = getClasses(current).split(' ').filter(Boolean).slice(0, 2);
      if (classes.length) part += '.' + classes.join('.');
      parts.unshift(part);
      current = current.parentElement;
    }
    return clean(parts.join(' > '), 220);
  }

  function sendClickEvent(element) {
    if (typeof gtag !== 'function') return;
    var tag = (element.tagName || '').toLowerCase();
    var params = {
      event_category: 'engagement',
      element_type: tag,
      element_id: clean(element.getAttribute('id')),
      element_name: clean(element.getAttribute('name')),
      element_role: clean(element.getAttribute('role')),
      element_classes: getClasses(element),
      element_label: getLabel(element),
      click_target: getTargetPath(element),
      page_path: clean(window.location.pathname, 220)
    };

    if (tag === 'input') params.input_type = clean(element.getAttribute('type') || 'text');

    var href = element.getAttribute('href') || element.href;
    if (href) {
      try {
        var url = new URL(href, window.location.href);
        params.link_url = clean(url.href, 500);
        params.link_domain = clean(url.hostname);
        params.outbound = url.hostname !== window.location.hostname ? 'true' : 'false';
      } catch (error) {
        params.link_url = clean(href, 500);
      }
    }

    try {
      gtag('event', 'site_click', params);
    } catch (error) {
      // Analytics should never interfere with the page.
    }
  }

  document.addEventListener('click', function (event) {
    if (!event.target || !event.target.closest) return;
    var element = event.target.closest(trackableSelector);
    if (!element || !document.documentElement.contains(element)) return;
    sendClickEvent(element);
  }, true);
})();
</script>
</head>
<body>

<div id="ui">
    <h1>HYDRO-DYNAMICS</h1>
    
    <div class="slider-wrap">
        <label>Solar Heat (Evaporation)</label>
        <input type="range" id="heat" min="0" max="100" value="40">
    </div>
    <div class="slider-wrap">
        <label>Atmospheric Cold (Condensation)</label>
        <input type="range" id="cold" min="0" max="100" value="50">
    </div>
    <div class="slider-wrap">
        <label>Gravity (Precipitation Speed)</label>
        <input type="range" id="grav" min="10" max="100" value="50">
    </div>
    <div class="slider-wrap">
        <label>Soil Porosity (Infiltration)</label>
        <input type="range" id="pore" min="0" max="100" value="30">
    </div>
    <div class="slider-wrap">
        <label>Surface Slope (Runoff Velocity)</label>
        <input type="range" id="slope" min="1" max="100" value="50">
    </div>

    <div class="data-readout">
        <div>ATMOS: <span id="stat-atm">0</span>%</div>
        <div>OCEAN: <span id="stat-ocn">0</span>%</div>
        <div>GROUND: <span id="stat-gnd">0</span>%</div>
    </div>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let w, h;
let particles = [];
const PARTICLE_COUNT = 1500; // Total global water mass

const params = {
    heat: 0.4,
    cold: 0.5,
    grav: 0.5,
    pore: 0.3,
    slope: 0.5
};

class WaterDrop {
    constructor() {
        this.reset('ocean');
    }

    reset(zone) {
        if (zone === 'ocean') {
            this.x = Math.random() * (w * 0.4);
            this.y = h - (Math.random() * 100);
            this.state = 'liquid'; // liquid, vapor, cloud, rain, ground
        }
        this.vx = 0;
        this.vy = 0;
    }

    update() {
        // --- PHYSICS ENGINE ---
        
        // 1. OCEAN STATE
        if (this.state === 'liquid') {
            this.vy = (Math.random() - 0.5) * 0.5;
            if (Math.random() < (params.heat * 0.01)) this.state = 'vapor';
        }

        // 2. VAPOR STATE (Rising)
        else if (this.state === 'vapor') {
            this.vy -= 0.1 * params.heat;
            this.vx += 0.5; // Wind
            if (this.y < h * 0.3) {
                if (Math.random() < params.cold * 0.1) this.state = 'cloud';
            }
        }

        // 3. CLOUD STATE (Floating)
        else if (this.state === 'cloud') {
            this.vy = (Math.random() - 0.5) * 0.2;
            this.vx = 1 + (params.slope * 0.1);
            // Probability of rain increases with gravity and cloud "weight" (cold)
            if (Math.random() < (params.grav * 0.005)) this.state = 'rain';
        }

        // 4. RAIN STATE (Falling)
        else if (this.state === 'rain') {
            this.vy += 0.5 * params.grav;
            if (this.y > h - 120) {
                // Hits Land vs Ocean
                if (this.x > w * 0.4) {
                    this.state = Math.random() < params.pore ? 'ground' : 'runoff';
                } else {
                    this.state = 'liquid';
                }
            }
        }

        // 5. RUNOFF (Moving back to ocean)
        else if (this.state === 'runoff') {
            this.vx = -2 * params.slope;
            this.vy = 0.5;
            if (this.x < w * 0.4) this.state = 'liquid';
        }

        // 6. GROUNDWATER (Slow seepage)
        else if (this.state === 'ground') {
            this.vx = -0.5;
            this.vy = 0.1;
            if (this.x < w * 0.4 || this.y > h) this.state = 'liquid';
        }

        this.x += this.vx;
        this.y += this.vy;

        // Boundary Wrap
        if (this.x > w) this.x = 0;
        if (this.x < 0) this.x = w;
    }

    draw() {
        let color;
        switch(this.state) {
            case 'liquid': color = '#00d2ff'; break;
            case 'vapor': color = 'rgba(255,255,255,0.2)'; break;
            case 'cloud': color = '#ffffff'; break;
            case 'rain': color = '#00f2fe'; break;
            case 'runoff': color = '#00ff88'; break;
            case 'ground': color = '#885522'; break;
        }
        ctx.fillStyle = color;
        ctx.fillRect(this.x, this.y, 2, 2);
    }
}

function init() {
    w = canvas.width = window.innerWidth - 320;
    h = canvas.height = window.innerHeight;
    particles = [];
    for(let i=0; i<PARTICLE_COUNT; i++) {
        particles.push(new WaterDrop());
    }
}

function drawTerrain() {
    // Ocean
    ctx.fillStyle = '#05101a';
    ctx.fillRect(0, h-100, w * 0.4, 100);
    // Land
    ctx.fillStyle = '#0a1a0a';
    ctx.beginPath();
    ctx.moveTo(w * 0.4, h-100);
    ctx.lineTo(w, h-250);
    ctx.lineTo(w, h);
    ctx.lineTo(w * 0.4, h);
    ctx.fill();
}

function update() {
    ctx.fillStyle = 'rgba(2, 4, 8, 0.3)'; // Trail effect
    ctx.fillRect(0, 0, w, h);
    
    drawTerrain();

    let counts = { atm: 0, ocn: 0, gnd: 0 };

    particles.forEach(p => {
        p.update();
        p.draw();
        if (p.state === 'vapor' || p.state === 'cloud' || p.state === 'rain') counts.atm++;
        else if (p.state === 'liquid' || p.state === 'runoff') counts.ocn++;
        else counts.gnd++;
    });

    // Update Stats
    document.getElementById('stat-atm').innerText = ((counts.atm/PARTICLE_COUNT)*100).toFixed(1);
    document.getElementById('stat-ocn').innerText = ((counts.ocn/PARTICLE_COUNT)*100).toFixed(1);
    document.getElementById('stat-gnd').innerText = ((counts.gnd/PARTICLE_COUNT)*100).toFixed(1);

    requestAnimationFrame(update);
}

// Slider listeners
document.querySelectorAll('input').forEach(el => {
    el.oninput = () => params[el.id] = el.value / 100;
});

window.onresize = init;
init();
update();
</script>
</body>
</html>
