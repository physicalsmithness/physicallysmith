<!DOCTYPE html>
<html lang="en">
<head>

<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-WKYGJYERSR');

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rutherford Scattering (Robust)</title>
<style>
    body {
        background-color: #1e293b; /* Dark Slate, not Black */
        color: white;
        font-family: sans-serif;
        text-align: center;
        margin: 20px;
    }
    .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
    }
    canvas {
        background-color: #000;
        border: 2px solid #475569;
        cursor: crosshair;
    }
    .controls {
        background: #334155;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 10px;
        display: inline-block;
    }
    button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        background-color: #38bdf8;
        border: none;
        border-radius: 4px;
        color: #000;
        font-weight: bold;
    }
    button:hover { background-color: #7dd3fc; }
    .status { font-family: monospace; color: #facc15; }
</style>
<!-- GA4 interaction tracking -->
<script>
(function () {
  if (window.__ga4InteractionTrackingInstalled) return;
  window.__ga4InteractionTrackingInstalled = true;

  var trackableSelector = 'a, button, input, select, textarea, summary, [role="button"], [role="link"], [role="tab"], [role="menuitem"], [data-ga4-click], [onclick]';
  var maxLength = 120;

  function clean(value, limit) {
    var text = String(value || '').replace(/\s+/g, ' ').trim();
    return text.slice(0, limit || maxLength);
  }

  function getLabel(element) {
    if (!element) return '';
    var tag = (element.tagName || '').toLowerCase();
    var type = (element.getAttribute('type') || '').toLowerCase();
    if ((tag === 'input' || tag === 'textarea') && !/^(button|submit|reset|checkbox|radio)$/.test(type)) {
      return clean(element.getAttribute('aria-label') || element.getAttribute('title') || element.getAttribute('name') || tag);
    }
    return clean(
      element.getAttribute('data-ga4-label') ||
      element.getAttribute('aria-label') ||
      element.getAttribute('title') ||
      element.innerText ||
      element.textContent ||
      element.getAttribute('name') ||
      element.getAttribute('id') ||
      tag
    );
  }

  function getClasses(element) {
    if (!element || !element.classList) return '';
    return clean(Array.prototype.slice.call(element.classList, 0, 6).join(' '));
  }

  function getTargetPath(element) {
    var parts = [];
    var current = element;
    while (current && current.nodeType === 1 && current !== document.body && parts.length < 5) {
      var part = (current.tagName || '').toLowerCase();
      var id = current.getAttribute('id');
      var testId = current.getAttribute('data-testid') || current.getAttribute('data-test') || current.getAttribute('data-ga4-id');
      if (id) {
        part += '#' + clean(id, 60);
        parts.unshift(part);
        break;
      }
      if (testId) part += '[data-id="' + clean(testId, 60) + '"]';
      var classes = getClasses(current).split(' ').filter(Boolean).slice(0, 2);
      if (classes.length) part += '.' + classes.join('.');
      parts.unshift(part);
      current = current.parentElement;
    }
    return clean(parts.join(' > '), 220);
  }

  function sendClickEvent(element) {
    if (typeof gtag !== 'function') return;
    var tag = (element.tagName || '').toLowerCase();
    var params = {
      event_category: 'engagement',
      element_type: tag,
      element_id: clean(element.getAttribute('id')),
      element_name: clean(element.getAttribute('name')),
      element_role: clean(element.getAttribute('role')),
      element_classes: getClasses(element),
      element_label: getLabel(element),
      click_target: getTargetPath(element),
      page_path: clean(window.location.pathname, 220)
    };

    if (tag === 'input') params.input_type = clean(element.getAttribute('type') || 'text');

    var href = element.getAttribute('href') || element.href;
    if (href) {
      try {
        var url = new URL(href, window.location.href);
        params.link_url = clean(url.href, 500);
        params.link_domain = clean(url.hostname);
        params.outbound = url.hostname !== window.location.hostname ? 'true' : 'false';
      } catch (error) {
        params.link_url = clean(href, 500);
      }
    }

    try {
      gtag('event', 'site_click', params);
    } catch (error) {
      // Analytics should never interfere with the page.
    }
  }

  document.addEventListener('click', function (event) {
    if (!event.target || !event.target.closest) return;
    var element = event.target.closest(trackableSelector);
    if (!element || !document.documentElement.contains(element)) return;
    sendClickEvent(element);
  }, true);
})();
</script>
</head>
<body>

    <h2>Rutherford Scattering Simulation</h2>
    <div class="controls">
        <label>Alpha Energy: <input type="range" id="energyRange" min="5" max="40" value="15"></label>
        <span id="energyVal">15</span> MeV
        <br><br>
        <button id="btnToggle">Start Beam</button>
        <button id="btnReset">Reset</button>
        <br>
        <p class="status">System Status: <span id="statusText">Initializing...</span></p>
    </div>

    <div class="container">
        <div>Chamber View</div>
        <canvas id="simCanvas" width="800" height="300"></canvas>
        
        <div>Detector Graph</div>
        <canvas id="graphCanvas" width="800" height="250"></canvas>
    </div>

<script>
window.onload = function() {
    // --- VARIABLES ---
    var simCanvas = document.getElementById("simCanvas");
    var simCtx = simCanvas.getContext("2d");
    var graphCanvas = document.getElementById("graphCanvas");
    var graphCtx = graphCanvas.getContext("2d");
    var statusText = document.getElementById("statusText");
    var btnToggle = document.getElementById("btnToggle");
    var btnReset = document.getElementById("btnReset");
    var energyRange = document.getElementById("energyRange");
    var energyVal = document.getElementById("energyVal");

    var particles = [];
    var running = false;
    var animationId = null;
    var nucleusX = 600;
    var nucleusY = 150;
    var bins = new Array(180).fill(0);
    var totalCounts = 0;
    
    // --- SETUP ---
    statusText.innerText = "Ready";
    
    // Draw initial empty graph grid
    drawGraph();
    drawNucleus();

    // --- CONTROLS ---
    btnToggle.onclick = function() {
        if (running) {
            running = false;
            btnToggle.innerText = "Resume Beam";
            statusText.innerText = "Paused";
            if (animationId) cancelAnimationFrame(animationId);
        } else {
            running = true;
            btnToggle.innerText = "Stop Beam";
            statusText.innerText = "Running...";
            loop();
        }
    };

    btnReset.onclick = function() {
        running = false;
        if (animationId) cancelAnimationFrame(animationId);
        particles = [];
        bins = new Array(180).fill(0);
        totalCounts = 0;
        
        simCtx.clearRect(0,0, simCanvas.width, simCanvas.height);
        drawNucleus();
        drawGraph();
        
        btnToggle.innerText = "Start Beam";
        statusText.innerText = "Reset Complete";
    };

    energyRange.oninput = function() {
        energyVal.innerText = this.value;
    };

    // --- PHYSICS LOOP ---
    function loop() {
        if (!running) return;

        // 1. Spawn Particle (Random chance per frame)
        if (Math.random() < 0.5) {
            spawnParticle();
        }

        // 2. Clear Screen (with trail effect)
        simCtx.fillStyle = 'rgba(0, 0, 0, 0.2)'; 
        simCtx.fillRect(0, 0, simCanvas.width, simCanvas.height);

        // 3. Draw Nucleus
        drawNucleus();

        // 4. Update Particles
        var energy = parseInt(energyRange.value);
        
        for (var i = 0; i < particles.length; i++) {
            var p = particles[i];
            
            if (p.dead) continue;

            // Move
            p.x += p.vx;
            p.y += p.vy;

            // Distance to Nucleus
            var dx = p.x - nucleusX;
            var dy = p.y - nucleusY;
            var distSq = dx*dx + dy*dy;
            var dist = Math.sqrt(distSq);

            // -- PHYSICS --
            
            // A. Strong Force Capture (Deviation)
            // If energy is high (>25) and it gets VERY close (<15px), it is absorbed.
            if (energy > 25 && dist < 15) {
                p.dead = true;
                // Draw capture flash
                simCtx.beginPath();
                simCtx.arc(p.x, p.y, 10, 0, Math.PI*2);
                simCtx.fillStyle = "red";
                simCtx.fill();
                continue;
            }

            // B. Coulomb Repulsion
            // Force = k / r^2
            // Vector logic: Force pushes AWAY from nucleus
            if (dist > 1) { // prevent divide by zero
                var force = 6000 / distSq; 
                var fx = (dx/dist) * force;
                var fy = (dy/dist) * force;
                
                p.vx += fx;
                p.vy += fy;
            }

            // Draw Particle
            simCtx.fillStyle = "#fbbf24"; // Yellow
            simCtx.fillRect(p.x, p.y, 3, 3);

            // Check Bounds (Exit Chamber)
            if (p.x < 0 || p.x > 800 || p.y < 0 || p.y > 300) {
                p.dead = true;
                recordData(p.vx, p.vy);
            }
        }

        // Cleanup dead particles array
        particles = particles.filter(function(p){ return !p.dead; });

        // Update Graph every frame
        drawGraph();

        animationId = requestAnimationFrame(loop);
    }

    function spawnParticle() {
        // Start on left side
        var energy = parseInt(energyRange.value);
        var p = {
            x: 0,
            y: nucleusY + (Math.random() * 60 - 30), // Random Y spread
            vx: (energy / 5) + 3, // Velocity based on slider
            vy: 0,
            dead: false
        };
        particles.push(p);
    }

    function drawNucleus() {
        simCtx.beginPath();
        simCtx.arc(nucleusX, nucleusY, 8, 0, Math.PI*2);
        simCtx.fillStyle = "orange";
        simCtx.fill();
        simCtx.fillStyle = "white";
        simCtx.fillText("Au", nucleusX-6, nucleusY+3);
    }

    function recordData(vx, vy) {
        // Calculate Angle
        var angleRad = Math.atan2(vy, vx);
        var angleDeg = Math.abs(angleRad * 180 / Math.PI);
        
        var binIndex = Math.floor(angleDeg);
        if (binIndex >= 0 && binIndex < 180) {
            bins[binIndex]++;
            totalCounts++;
        }
    }

    function drawGraph() {
        var w = graphCanvas.width;
        var h = graphCanvas.height;

        // Clear Graph
        graphCtx.fillStyle = "#000";
        graphCtx.fillRect(0,0,w,h);
        
        // Grid Lines
        graphCtx.strokeStyle = "#333";
        graphCtx.lineWidth = 1;
        graphCtx.beginPath();
        graphCtx.moveTo(0, h-20); graphCtx.lineTo(w, h-20); // X axis
        graphCtx.stroke();

        // If no data, stop here
        if (totalCounts < 5) return;

        // --- 1. Draw Expected (Blue Line) ---
        // Formula: 1 / sin^4(theta/2)
        graphCtx.strokeStyle = "#38bdf8";
        graphCtx.beginPath();
        var scaleFactor = totalCounts * 0.5; // Arbitrary scaling for visuals
        
        for (var x = 0; x < w; x++) {
            var angle = (x / w) * 180;
            if (angle < 5) continue; // Avoid infinity
            
            var rad = angle * Math.PI / 180;
            var val = 1 / Math.pow(Math.sin(rad/2), 4);
            var y = h - 20 - (val * scaleFactor * 0.005);
            
            if (y < 0) y = 0; // Cap at top
            
            if (x===0) graphCtx.moveTo(x, y);
            else graphCtx.lineTo(x, y);
        }
        graphCtx.stroke();

        // --- 2. Draw Actual Data (Red Histogram) ---
        graphCtx.fillStyle = "#f87171";
        for (var i = 0; i < 180; i++) {
            var count = bins[i];
            if (count > 0) {
                var xPos = (i / 180) * w;
                // Linear height
                var barHeight = count * 5; 
                graphCtx.fillRect(xPos, h - 20 - barHeight, 4, barHeight);
            }
        }
    }
};
</script>
</body>
</html>
